<p *ngIf="!favoritePhotos().length; else showFavoritesPhotos">
  No favorites photos
</p>

<ng-template #showFavoritesPhotos>
  <mat-grid-list
    cols="3"
    rowHeight="1:1"
    gutterSize="24px"
    class="favorites-list"
  >
    <mat-grid-tile *ngFor="let photo of favoritePhotos(); trackBy: trackById">
      <img
        [src]="photo.url"
        [routerLink]="['/photos', photo.id]"
        alt="Favorite photo"
      />
    </mat-grid-tile>
  </mat-grid-list>
</ng-template>
